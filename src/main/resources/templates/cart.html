<!doctype html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="/">

    <title>Perception Check</title>

    <link rel="canonical" href="https://getbootstrap.com/docs/4.0/examples/album/">

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/styles/main.css}"/>
</head>

<body>

<div th:replace="~{fragments/header.html}"></div>

<main role="main">

    <div class="album py-5 bg-light">
        <h1 class="jumbotron-heading heading-dark">My cart</h1>
        <div class="cards-container" th:if="${#order.isEmpty(orderProducts)}">
            <p>No product placed in cart</p>
        </div>
        <div class="cards-container" th:unless="${#order.isEmpty(orderProducts)}">
            <div class="card card-body" th:each="product : ${orderProducts}">
                <div class="img-title-text-container">
                    <img class="card-img-top" th:src="@{${'/img/' + product.image}}" alt="Card image cap">
                    <h2 class="card-title" th:text="${product.name}"></h2>
                    <p class="card-text" th:text="${product.description}"></p>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <p class="card-price" th:text="${product.price + '€'}"></p>
                </div>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer.html}"></div>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
